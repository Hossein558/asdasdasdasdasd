name: Jira 8.20.30 with SQL Server Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --memory=2g
          --name sqlserver

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server to accept connections..."
          for i in {1..30}; do
            if docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P "YourStrong@Passw0rd" \
              -C -Q "SELECT 1" &>/dev/null; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Attempt $i: SQL Server not ready yet, waiting 2 seconds..."
            sleep 2
          done

      - name: Create Jira database
        run: |
          docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "YourStrong@Passw0rd" -C \
            -Q "CREATE DATABASE jiradb COLLATE SQL_Latin1_General_CP1_CS_AS;"
          
          docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "YourStrong@Passw0rd" -C \
            -Q "ALTER DATABASE jiradb SET READ_COMMITTED_SNAPSHOT ON;"

      - name: Download SQL Server JDBC Driver
        run: |
          wget -q https://download.microsoft.com/download/6/9/9/699205ca-f1f1-4de9-9335-18546c5dfad1/sqljdbc_9.4.1.0_enu.tar.gz
          tar -xzf sqljdbc_9.4.1.0_enu.tar.gz
          sudo mkdir -p /opt/atlassian/jira/lib
          sudo cp sqljdbc_9.4/enu/mssql-jdbc-9.4.1.jre8.jar /opt/atlassian/jira/lib/

      - name: Download and Install Jira 8.20.30
        run: |
          wget -q https://product-downloads.atlassian.com/software/jira/downloads/atlassian-jira-software-8.20.30-x64.bin
          chmod +x atlassian-jira-software-8.20.30-x64.bin
          sudo ./atlassian-jira-software-8.20.30-x64.bin -q -varfile response.varfile

      - name: Configure Jira database connection
        run: |
          sudo mkdir -p /var/atlassian/application-data/jira
          sudo tee /var/atlassian/application-data/jira/dbconfig.xml > /dev/null <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <jira-database-config>
            <name>defaultDS</name>
            <delegator-name>default</delegator-name>
            <database-type>mssql</database-type>
            <schema-name>dbo</schema-name>
            <jdbc-datasource>
              <url>jdbc:sqlserver://localhost:1433;databaseName=jiradb;encrypt=false</url>
              <driver-class>com.microsoft.sqlserver.jdbc.SQLServerDriver</driver-class>
              <username>sa</username>
              <password>YourStrong@Passw0rd</password>
              <pool-min-size>20</pool-min-size>
              <pool-max-size>20</pool-max-size>
              <pool-max-wait>30000</pool-max-wait>
              <validation-query>select 1</validation-query>
              <min-evictable-idle-time-millis>60000</min-evictable-idle-time-millis>
              <time-between-eviction-runs-millis>300000</time-between-eviction-runs-millis>
              <pool-max-idle>20</pool-max-idle>
              <pool-remove-abandoned>true</pool-remove-abandoned>
              <pool-remove-abandoned-timeout>300</pool-remove-abandoned-timeout>
              <pool-test-on-borrow>false</pool-test-on-borrow>
              <pool-test-while-idle>true</pool-test-while-idle>
            </jdbc-datasource>
          </jira-database-config>
          EOF

      - name: Start Jira
        run: |
          sudo /opt/atlassian/jira/bin/start-jira.sh
          echo "Waiting for Jira to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8080 | grep -q "Atlassian"; then
              echo "Jira is up!"
              break
            fi
            sleep 5
          done

      - name: Run basic integration tests
        run: |
          # Test if Jira responds
          curl -f http://localhost:8080 || exit 1
          
          # Check database connectivity
          docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "YourStrong@Passw0rd" -C \
            -Q "SELECT COUNT(*) FROM jiradb.INFORMATION_SCHEMA.TABLES;"

      - name: Show Jira logs on failure
        if: failure()
        run: |
          sudo cat /opt/atlassian/jira/logs/catalina.out || true
          docker logs sqlserver || true
