name: Jira 8.20.30 Test on Ubuntu 22.04

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --memory 2g
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server to be ready..."
          for i in {1..30}; do
            if docker exec $(docker ps -q --filter ancestor=mcr.microsoft.com/mssql/server:2019-latest) /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Attempt $i: SQL Server not ready yet..."
            sleep 2
          done
          sleep 5

      - name: Create Jira Database
        run: |
          CONTAINER_ID=$(docker ps -q --filter ancestor=mcr.microsoft.com/mssql/server:2019-latest)
          docker exec $CONTAINER_ID /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'jiradb')
          BEGIN
            CREATE DATABASE jiradb COLLATE SQL_Latin1_General_CP1_CS_AS;
          END
          "
          docker exec $CONTAINER_ID /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -d jiradb -Q "
          ALTER DATABASE jiradb SET READ_COMMITTED_SNAPSHOT ON;
          "
          echo "Database created and configured successfully"

      - name: Download Jira 8.20.30
        run: |
          wget https://product-downloads.atlassian.com/software/jira/downloads/atlassian-jira-software-8.20.30.tar.gz
          tar -xzf atlassian-jira-software-8.20.30.tar.gz
          mv atlassian-jira-software-8.20.30-standalone jira

      - name: Configure Jira Home
        run: |
          mkdir -p /tmp/jira-home
          echo "jira.home = /tmp/jira-home" > jira/atlassian-jira/WEB-INF/classes/jira-application.properties

      - name: Configure Database Connection
        run: |
          mkdir -p /tmp/jira-home
          cat > /tmp/jira-home/dbconfig.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <jira-database-config>
            <name>defaultDS</name>
            <delegator-name>default</delegator-name>
            <database-type>mssql</database-type>
            <schema-name>dbo</schema-name>
            <jdbc-datasource>
              <url>jdbc:sqlserver://localhost:1433;databaseName=jiradb;encrypt=false</url>
              <driver-class>com.microsoft.sqlserver.jdbc.SQLServerDriver</driver-class>
              <username>sa</username>
              <password>YourStrong@Passw0rd</password>
              <pool-min-size>20</pool-min-size>
              <pool-max-size>20</pool-max-size>
              <pool-max-wait>30000</pool-max-wait>
              <validation-query>select 1</validation-query>
              <min-evictable-idle-time-millis>60000</min-evictable-idle-time-millis>
              <time-between-eviction-runs-millis>300000</time-between-eviction-runs-millis>
              <pool-max-idle>20</pool-max-idle>
              <pool-remove-abandoned>true</pool-remove-abandoned>
              <pool-remove-abandoned-timeout>300</pool-remove-abandoned-timeout>
              <pool-test-on-borrow>false</pool-test-on-borrow>
              <pool-test-while-idle>true</pool-test-while-idle>
            </jdbc-datasource>
          </jira-database-config>
          EOF

      - name: Download MS SQL JDBC Driver
        run: |
          wget https://github.com/microsoft/mssql-jdbc/releases/download/v9.4.1/mssql-jdbc-9.4.1.jre8.jar -P jira/lib/

      - name: Configure Unattended Setup
        run: |
          cat > /tmp/jira-home/jira-config.properties << 'EOF'
          jira.mode=private
          jira.setup=true
          EOF

      - name: Set JVM Memory Options
        run: |
          echo "export JVM_MINIMUM_MEMORY=512m" >> jira/bin/setenv.sh
          echo "export JVM_MAXIMUM_MEMORY=1024m" >> jira/bin/setenv.sh

      - name: Start Jira
        run: |
          cd jira/bin
          chmod +x startup.sh
          ./startup.sh
          echo "Waiting for Jira to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Jira is up!"
              break
            fi
            echo "Attempt $i: Waiting for Jira..."
            sleep 3
          done

      - name: Verify Jira Setup
        run: |
          echo "Checking Jira availability..."
          curl -I http://localhost:8080 || echo "Jira not responding"
          echo "Checking database connection..."
          CONTAINER_ID=$(docker ps -q --filter ancestor=mcr.microsoft.com/mssql/server:2019-latest)
          docker exec $CONTAINER_ID /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -d jiradb -Q "SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES;" || echo "No tables yet"

      - name: Check Jira Logs
        if: always()
        run: |
          echo "=== Catalina Logs ==="
          cat jira/logs/catalina.out || echo "No catalina.out found"
          echo ""
          echo "=== Jira Application Logs ==="
          if [ -d "/tmp/jira-home/log" ]; then
            ls -la /tmp/jira-home/log/
            cat /tmp/jira-home/log/atlassian-jira.log || echo "No Jira log found"
          else
            echo "No Jira logs directory"
          fi

      - name: Test Jira HTTP Response
        run: |
          curl -v http://localhost:8080 || echo "Jira not responding on port 8080"
          netstat -tulpn | grep 8080 || echo "Port 8080 not listening"

      - name: Stop Jira
        if: always()
        run: |
          if [ -d "jira/bin" ]; then
            cd jira/bin
            chmod +x shutdown.sh
            ./shutdown.sh || echo "Jira already stopped"
            sleep 5
          else
            echo "Jira directory not found"
          fi
