name: Jira 8.20.30 Test on Ubuntu 22.04

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server to be ready..."
          for i in {1..30}; do
            if docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Attempt $i: SQL Server not ready yet..."
            sleep 2
          done

      - name: Create Jira Database
        run: |
          docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'jiradb')
          BEGIN
            CREATE DATABASE jiradb;
          END
          "
          docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -d jiradb -Q "
          ALTER DATABASE jiradb SET READ_COMMITTED_SNAPSHOT ON;
          "

      - name: Download Jira 8.20.30
        run: |
          wget https://product-downloads.atlassian.com/software/jira/downloads/atlassian-jira-software-8.20.30.tar.gz
          tar -xzf atlassian-jira-software-8.20.30.tar.gz
          mv atlassian-jira-software-8.20.30-standalone jira

      - name: Configure Jira Home
        run: |
          mkdir -p /tmp/jira-home
          echo "jira.home = /tmp/jira-home" > jira/atlassian-jira/WEB-INF/classes/jira-application.properties

      - name: Configure Database Connection
        run: |
          mkdir -p /tmp/jira-home
          cat > /tmp/jira-home/dbconfig.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <jira-database-config>
            <name>defaultDS</name>
            <delegator-name>default</delegator-name>
            <database-type>mssql</database-type>
            <schema-name>dbo</schema-name>
            <jdbc-datasource>
              <url>jdbc:sqlserver://localhost:1433;databaseName=jiradb;encrypt=false</url>
              <driver-class>com.microsoft.sqlserver.jdbc.SQLServerDriver</driver-class>
              <username>sa</username>
              <password>YourStrong@Passw0rd</password>
              <pool-min-size>20</pool-min-size>
              <pool-max-size>20</pool-max-size>
              <pool-max-wait>30000</pool-max-wait>
              <validation-query>select 1</validation-query>
              <min-evictable-idle-time-millis>60000</min-evictable-idle-time-millis>
              <time-between-eviction-runs-millis>300000</time-between-eviction-runs-millis>
              <pool-max-idle>20</pool-max-idle>
              <pool-remove-abandoned>true</pool-remove-abandoned>
              <pool-remove-abandoned-timeout>300</pool-remove-abandoned-timeout>
              <pool-test-on-borrow>false</pool-test-on-borrow>
              <pool-test-while-idle>true</pool-test-while-idle>
            </jdbc-datasource>
          </jira-database-config>
          EOF

      - name: Download MS SQL JDBC Driver
        run: |
          wget https://github.com/microsoft/mssql-jdbc/releases/download/v9.4.1/mssql-jdbc-9.4.1.jre8.jar -P jira/lib/

      - name: Start Jira
        run: |
          cd jira/bin
          chmod +x startup.sh
          ./startup.sh
          echo "Waiting for Jira to start..."
          sleep 120

      - name: Check Jira Logs
        if: always()
        run: |
          echo "=== Catalina Logs ==="
          cat jira/logs/catalina.out || echo "No catalina.out found"
          echo "=== Jira Logs ==="
          ls -la /tmp/jira-home/log/ || echo "No Jira logs directory"
          cat /tmp/jira-home/log/atlassian-jira.log || echo "No Jira log found"

      - name: Test Jira HTTP Response
        run: |
          curl -I http://localhost:8080 || echo "Jira not responding on port 8080"

      - name: Install Plugin
        run: |
          echo "Installing plugin..."
          # Plugin installation logic here

      - name: Stop Jira
        if: always()
        run: |
          cd jira/bin
          chmod +x shutdown.sh
          ./shutdown.sh || echo "Jira already stopped"
